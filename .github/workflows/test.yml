name: Test

on:
  push:
  pull_request:
    branches:
    - master

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.8'
        - '3.9'
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: 'Set up Python ${{ matrix.python-version }}'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: python version
      run: |
        python --version
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install .
    - name: Test
      run: |
        python -m unittest
