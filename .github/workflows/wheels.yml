name: Build & publish wheels

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Build and PyPI publish jobs only read the repo; the release job elevates to
# contents: write at the job level to create the GitHub Release.
permissions:
  contents: read

# Coalesce reruns of the same ref+event; never cancel an in-flight run (a release
# push must finish creating the release and uploading).
concurrency:
  group: wheels-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build_wheels:
    name: Wheels ${{ matrix.archs }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (native) — builds manylinux + musllinux
          - { os: ubuntu-latest,    archs: x86_64 }
          # Linux aarch64 (native arm runner, no QEMU) — manylinux + musllinux
          - { os: ubuntu-24.04-arm, archs: aarch64 }
          - { os: windows-latest,   archs: AMD64 }
          # Windows ARM64 (native build on windows-11-arm; tests skipped via
          # test-skip — experimental target, cannot run on the build host).
          # cibuildwheel builds cp310-cp314 win_arm64 here.
          - { os: windows-11-arm,   archs: ARM64 }
          # macOS Intel — macos-13 is decommissioned, use macos-15-intel
          - { os: macos-15-intel,   archs: x86_64 }
          - { os: macos-14,         archs: arm64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Keep cibuildwheel pinned so wheel build behavior only changes after an
      # explicit release-notes review.
      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  create_release:
    name: Create GitHub Release
    needs: [build_wheels, make_sdist]
    # Only on push to master (never on PR / workflow_dispatch). The
    # release-with-commit step below is itself a no-op unless the head commit
    # message matches "Release X.Y.Z", so ordinary master pushes build wheels but
    # publish nothing.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # contents: write is needed for release-with-commit to create the Release.
    permissions:
      contents: write # create GitHub Release
    outputs:
      created: ${{ steps.create_release.outputs.created }}
      tag_name: ${{ steps.create_release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      # Creates the GitHub Release + tag only when the head commit message
      # matches the regexp; otherwise it is a no-op and 'created' is 'false'.
      - name: Create GitHub Release on "Release X.Y.Z" commit
        id: create_release
        uses: ChanTsune/release-with-commit@5a427bc9fbc54bf678e4c0bf36f4914d138d6b15 # v4.0.0
        with:
          regexp: "Release (\\d+([.]\\d+)*)\n*((\\s|\\S)+)"
          regexp_options: "us"
          release_name: "version $1"
          tag_name: "$1"
          body: "$3"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to PyPI
    needs: [build_wheels, make_sdist, create_release]
    if: github.event_name == 'push' && needs.create_release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: cibw-*
          merge-multiple: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
          twine upload --non-interactive dist/*
