name: "PyPI credential check"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-auth-check-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  pypi-auth-check:
    name: Check PyPI credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools twine

      - name: Build sdist
        run: python setup.py sdist

      - name: Check package metadata
        run: twine check dist/*

      - name: Guard against publishing new files
        run: |
          python - <<'PY'
          import glob
          import json
          import subprocess
          import sys
          import urllib.request
          from pathlib import Path

          name = subprocess.check_output(
              [sys.executable, "setup.py", "--name"], text=True
          ).strip()
          version = subprocess.check_output(
              [sys.executable, "setup.py", "--version"], text=True
          ).strip()

          url = f"https://pypi.org/pypi/{name}/{version}/json"
          with urllib.request.urlopen(url) as response:
              release = json.load(response)

          existing = {item["filename"] for item in release["urls"]}
          built = {Path(path).name for path in glob.glob("dist/*")}
          missing = sorted(built - existing)

          if missing:
              print("Refusing to upload files that do not already exist on PyPI:")
              for filename in missing:
                  print(f"  {filename}")
              sys.exit(1)

          print("All built files already exist on PyPI; upload check can only skip.")
          PY

      - name: Check PyPI upload credentials
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload --non-interactive --skip-existing dist/*
