name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "43 13 * * 1"

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload CodeQL SARIF results to code scanning
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Build the c-cpp database with an explicit build instead of autobuild:
      # autobuild runs setup.py with the runner's old system setuptools (no PEP
      # 517 isolation), which cannot parse the PEP 639 SPDX license. `pip install`
      # builds with isolation (setuptools>=77) and CodeQL traces the compile.
      - name: Set up Python
        if: matrix.build-mode == 'manual'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: Build the C extension
        if: matrix.build-mode == 'manual'
        run: pip install .

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}
